name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install trace tools
        run: |
          sudo apt-get update
          sudo apt-get install -y liblua5.4-dev lua5.4 pkg-config

      - name: Run development check
        run: make check

      - name: Check after score artifacts
        run: |
          make json > score.json || true
          python3 -m json.tool score.json > /dev/null
          make check

      - name: Run Lua trace smoke
        run: make trace-smoke

      - name: Check JSON report
        run: |
          make report-json > report.json || true
          python3 -m json.tool report.json > /dev/null

      - name: Build dist tarball
        run: make dist

      - name: Check dist package
        run: make dist-check
