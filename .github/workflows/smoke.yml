name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install trace tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Build and smoke test
        run: make smoke

      - name: Check trace syntax
        run: make trace-check

      - name: Check handout package
        run: make handout-check
