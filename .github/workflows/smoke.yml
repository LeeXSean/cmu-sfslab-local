name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install trace tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Check handout
        run: make check

      - name: Build dist tarball
        run: make dist
